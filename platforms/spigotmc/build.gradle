repositories {
    maven {
        url = 'https://hub.spigotmc.org/nexus/content/groups/public/'

        content {
            includeGroup 'org.bukkit'
            includeGroup 'org.spigotmc'
        }
    }
}

dependencies {
    compileOnly 'org.spigotmc:spigot-api:26.1.2-R0.1-SNAPSHOT'

    compileOnly project(':tools')

    // MCPaimon SpigotMC specific dependency
    compileOnly 'io.github.mcpaimon:spigotmc:2026.0.7-8'
}

base {
    archivesName = "${project.property('project-name')}SpigotMC"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'servertools-spigotmc'

            pom {
                name = project.name
                description = "MCPaimon Extension ServerTools SpigotMC"
            }
        }
    }
}
